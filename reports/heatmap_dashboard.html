<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spotify Discovery - Review Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
.header{background:#181818;border-bottom:1px solid #252525;padding:15px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:17px;font-weight:800}.logo span{color:#1DB954}
.stats{display:flex;gap:28px}
.stat{text-align:center}.stat-v{font-size:20px;font-weight:800;color:#1DB954}.stat-l{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.content{padding:22px 28px;max-width:1380px;margin:0 auto}
h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.1px;margin-bottom:14px}
.section{margin-bottom:30px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:#181818;border-radius:12px;padding:18px;border:1px solid #222}
.q-card{background:#181818;border-radius:10px;padding:15px;cursor:pointer;border:1.5px solid #222;transition:border-color .15s}
.q-card:hover{border-color:#444}
.q-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.q-title{font-size:12px;font-weight:600;margin-bottom:8px;line-height:1.45;color:#ccc}
.q-bar-track{height:5px;background:#282828;border-radius:3px;overflow:hidden;margin-bottom:6px}
.q-bar-fill{height:100%;border-radius:3px}
.q-meta{font-size:11px;color:#555}
.heatmap-wrap{overflow-x:auto}
.hm{border-collapse:separate;border-spacing:3px;width:100%;min-width:640px}
.hm th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:6px 4px;text-align:center;white-space:nowrap}
.hm td.t-name{font-size:12px;color:#bbb;padding:0 10px 0 2px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.hm td.cell{width:72px;height:30px;text-align:center;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;transition:transform .1s,filter .1s}
.hm td.cell:hover{transform:scale(1.1);filter:brightness(1.2)}
.hm td.empty{background:#141414;border-radius:5px;height:30px}
.vol-pill{display:inline-block;background:#1e1e1e;border-radius:6px;padding:2px 8px;font-size:11px;color:#555}
.src-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.src-label{font-size:12px;color:#999;width:85px;flex-shrink:0}
.src-track{flex:1;height:8px;background:#222;border-radius:4px;overflow:hidden}
.src-fill{height:100%;border-radius:4px}
.src-n{font-size:11px;color:#555;width:44px;text-align:right;flex-shrink:0}
.t-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e1e;cursor:pointer}
.t-row:last-child{border-bottom:none}
.t-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.t-info{flex:1;min-width:0}
.t-lbl{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sum{font-size:11px;color:#555;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-vol{font-size:12px;color:#666;white-space:nowrap;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0}
.b-high{background:rgba(29,185,84,.15);color:#1DB954}
.b-med{background:rgba(245,158,11,.12);color:#f59e0b}
.b-low{background:rgba(107,114,128,.12);color:#9ca3af}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
#panel{display:none;position:fixed;top:0;right:0;width:min(480px,94vw);height:100vh;background:#141414;border-left:1px solid #252525;z-index:200;overflow-y:auto;padding:24px 20px 48px}
.pcls{float:right;margin:-2px -2px 14px 12px;background:#272727;border:none;color:#999;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;line-height:30px;text-align:center}
.pcls:hover{background:#404040;color:#fff}
#panel h3{font-size:15px;font-weight:700;line-height:1.4;word-wrap:break-word;overflow-wrap:anywhere;clear:both;margin-bottom:5px}
.dp-sum{font-size:13px;color:#888;line-height:1.6;word-wrap:break-word;overflow-wrap:anywhere;margin-top:4px}
.dp-stats{display:flex;gap:10px;margin:14px 0}
.dp-stat{background:#1e1e1e;border-radius:8px;padding:10px 14px;flex:1;text-align:center}
.dp-stat-v{font-size:18px;font-weight:800}
.dp-stat-l{font-size:10px;color:#444;text-transform:uppercase;margin-top:2px}
.dp-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#3a3a3a;margin:16px 0 10px}
.th-card{background:#0d0d0d;border-radius:8px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #333}
.th-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.th-title{font-size:13px;font-weight:700;word-wrap:break-word;overflow-wrap:anywhere;line-height:1.4}
.th-sum{font-size:12px;color:#666;line-height:1.55;word-wrap:break-word;overflow-wrap:anywhere}
.q-chip{display:inline-block;margin:0 4px 4px 0;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.qt-card{background:#0a0a0a;border-radius:8px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #2a2a2a}
.qt-text{font-size:13px;font-style:italic;color:#bbb;line-height:1.7;margin-bottom:6px;word-wrap:break-word;overflow-wrap:anywhere}
.qt-src{font-size:11px;color:#3a3a3a}
.qt-mini{font-size:11px;font-style:italic;color:#444;margin-top:6px;padding-left:8px;border-left:2px solid #252525;line-height:1.55;word-wrap:break-word;overflow-wrap:anywhere}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Spotify <span>Discovery</span> &middot; Review Analysis</div>
  <div class="stats" id="hdr-stats"></div>
  <div style="font-size:11px;color:#3a3a3a">Pipeline v0.1.0</div>
</div>

<div class="content">
  <div class="section">
    <h2>Signal by Diagnostic Question</h2>
    <div class="grid3" id="q-cards"></div>
  </div>

  <div class="section">
    <h2>Theme &times; Question Heatmap
      <span style="font-size:10px;color:#3a3a3a;font-weight:400;text-transform:none;letter-spacing:0">
        &nbsp;(one row per unique theme &middot; click any cell for quotes)
      </span>
    </h2>
    <div class="card heatmap-wrap">
      <table class="hm" id="hm"></table>
    </div>
  </div>

  <div class="grid2">
    <div class="section">
      <h2>Reviews by Source</h2>
      <div class="card">
        <canvas id="srcChart" height="140"></canvas>
        <div style="margin-top:18px" id="src-bars"></div>
      </div>
    </div>
    <div class="section">
      <h2>Top Themes by Volume</h2>
      <div class="card" id="top-themes"></div>
    </div>
  </div>

  <div class="section">
    <h2>Review Volume per Diagnostic Question</h2>
    <div class="card"><canvas id="volChart" height="75"></canvas></div>
  </div>
</div>

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <button class="pcls" onclick="closePanel()">&#x2715;</button>
  <div id="panel-body"></div>
</div>

<script>
var D  = {"total_reviews": 2594, "total_clusters": 59, "source_counts": {"app_store": 1124, "play_store": 1470, "reddit": 0}, "q_totals": {"1": 475, "2": 644, "3": 618, "4": 680, "5": 508, "6": 474}, "q_labels": {"1": "Awareness", "2": "Trust", "3": "Effort", "4": "Relevance", "5": "Context", "6": "Agency"}, "q_colors": {"1": "#10b981", "2": "#3b82f6", "3": "#ef4444", "4": "#8b5cf6", "5": "#06b6d4", "6": "#f97316"}, "heatmap_rows": [{"label": "Personalized Content", "cells": {"2": {"volume": 254}, "4": {"volume": 254}, "5": {"volume": 254}}, "total": 762, "summary": "Users love recommended content", "confidence": "medium", "quotes": [{"text": "I’ve been listening to Southern mysteries for quite some time and decided to go ahead and write a review. It’s been most intriguing. I’ve always wanted to be like a forensic investigator. This series, which is researched by just one person is just mind-boggling. She’s done an amazing job with presenting mysteries and debit in such a way that’s just captivate the audience, well done.", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14194252995", "rating": 5, "created_at": "2026-06-17 17:27:21+00:00"}, {"text": "I love everything about it, but there was just one tiny itty-bitty thing. I don’t really like about it. It’s that whenever you watch a video or a podcast or whatever you want it always freezes and you have to pause it to make it work or you just have to pick a different thing and I don’t really like that but that’s fine. I still love the music.", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14194617994", "rating": 4, "created_at": "2026-06-17 19:22:59+00:00"}, {"text": "I really like the recommendation algorithm. It pushes me towards great music I’d never find otherwise. The amount of new / additional services prominent on the landing page however is annoying and in danger of becoming off putting noise.", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14193081085", "rating": 4, "created_at": "2026-06-17 11:36:10+00:00"}]}, {"label": "Limited Music Control", "cells": {"3": {"volume": 141}, "4": {"volume": 141}, "6": {"volume": 141}}, "total": 423, "summary": "Users feel forced to listen", "confidence": "medium", "quotes": [{"text": "If you read most of the “5 star reviews” it’s people complaining here’s my not “5 star review”: \nUsed to like using this app, but anymore I hate even looking at it. The “random shuffle” is a lie it plays the same songs over and over constantly and you only get 6 skips after that you don’t have any left so you’re forced to listen to the exact same songs. Just kidding, after every single song there’s 5-6 ads. So you’re not listening to anything at all! Just ads. Constantly. I’ve tracked it if you ", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14196284390", "rating": 3, "created_at": "2026-06-18 06:31:59+00:00"}, {"text": "[ update ]\n\nFYM I GOTTA PAY TO CHOOSE WHAT I CAN LISTEN TOO?? LIKE OMG HOW AM I GUNNA KNOW WHAT TO PUT IN MY FLAMIN PLAYLIST U GREEDY PLEB\n\nAs soon as I turned on the app it gave me 3 adds right off the bat! Oh and it’s the same 2 adds over and over and over again!\nEven though I turned off the smart shuffle it still adds the most random songs which I have no interest/enjoyment listening to. I’ve recently discovered that if you change your country to somewhere like Japan the premium price becomes", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14159377812", "rating": 1, "created_at": "2026-06-08 18:44:30+00:00"}, {"text": "This is one of the most horrid apps I’ve ever witnessed. I don’t know what sadist created this but the concept of you being treated like a serf if u don’t pay for premium disgusts me. It’s a music app and you’re just unable to listen to music on phone if ur a third class citizen. 6 skips per HOUR and u only get to CHOOSE what song YOU listen to 6 times. Religious people are stupid for believing there could possibly be a God when this is what’s happening in his supposed garden of Eden. And just l", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14198461326", "rating": 1, "created_at": "2026-06-18 19:02:37+00:00"}]}, {"label": "Monetization Over Users", "cells": {"1": {"volume": 89}, "3": {"volume": 89}, "6": {"volume": 89}}, "total": 267, "summary": "Users feel Spotify prioritizes money over experience", "confidence": "medium", "quotes": [{"text": "Don’t know even know where Spotify even began to purge downhill, but it did. Everything is incredibly money grabbing now. Why do I have to get premium to skip songs, queue songs, choose what I want to listen to, AND look at the lyrics. You can AT LEAST let us look at the lyrics, since it was always free up until around two years ago, which, by the way, seems greedy and money-hungry. Getting premium is practically a must at this point, considering you’ve taken away all the freedoms we once had, a", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14198594337", "rating": 2, "created_at": "2026-06-18 19:47:37+00:00"}, {"text": "This app has continued to disappoint in the last few months. As they’ve added more and more unwanted content… audio books etc. it’s become slower and slower. Its core purpose is to download and listen to music. It’s glitchy now on ‘downloaded’ playlists on different devices and often can’t access downloaded content offline to listen to. It’s also performing poorly on iPad… have recently replaced to new iPad and still the same problems. Family and friends are also all having problems, not all bas", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14163729401", "rating": 2, "created_at": "2026-06-09 21:37:32+00:00"}, {"text": "Tbh I wanted to rate it 0 but there’s no option cuz istg this is the most stupidest ever app.. they just wanna make money by shoeing and adds. I literally just changed a song and everytime I do that a add comes up and also the app is really not build for iPads it takes hours to reload and the app works really slow… I’ve been using Spotify since a long time and at the beginning the used to be very nice but now the quality goes way low. Using this app is now a hassle for me.it takes sooo longgggg ", "source": "app_store", "source_url": "https://apps.apple.com/in/app/spotify/id14168862031", "rating": 1, "created_at": "2026-06-11 06:36:41+00:00"}]}, {"label": "Personal Music Experience", "cells": {"2": {"volume": 117}, "5": {"volume": 117}}, "total": 234, "summary": "Users love Spotify for personal music experiences", "confidence": "medium", "quotes": [{"text": "Sure, without the dash:\n\nSpotify feels less like a music app and more like a memory box. Every playlist holds a version of me: road trips, evening walks, happy days, heartbreaks, and moments when I simply sat staring at the sky. The best thing about Spotify isn’t the millions of songs; it’s how easily it finds the soundtrack for whatever I’m feeling. Whether I want comfort, excitement, nostalgia, or peace, it’s always there waiting with the right song. ★★★★★", "source": "app_store", "source_url": "https://apps.apple.com/in/app/spotify/id14157796103", "rating": 5, "created_at": "2026-06-08 10:11:50+00:00"}, {"text": "Ok im biased bcs i have spotify plus lmao but i LOVE it i cant live without music and this jst makes it so easy! U can use it for so much other than music aswl lmao and i LOVE how aesthetic it is like come on! I have always been a spotify girl never others bcs i jst prefer ittt, i love how its so easy to make albums and everythingggg deffo recco xxxx 🫰🏽🫰🏽🪽🪽", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14159272692", "rating": 5, "created_at": "2026-06-08 18:09:54+00:00"}, {"text": "Been with Spotify since 2007 and have been in love ever since! Only thing that could make it better is if they were able to get all of Garth Brooks music and Garth Brooks is actually singing not a tribute band. Help me out Spotify! Been a loyal customer for 9 years……give me the real Garth Brooks lol", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14197215775", "rating": 5, "created_at": "2026-06-18 12:48:14+00:00"}]}, {"label": "Premium Limitations", "cells": {"1": {"volume": 72}, "3": {"volume": 72}, "6": {"volume": 72}}, "total": 216, "summary": "Users struggle with limited features", "confidence": "medium", "quotes": [{"text": "I love that we can listen to any music that is on there, game soundtracks, audiobooks, podcasts, etc. I also love that we can make several playlists and the app will suggest songs that match the vibe. \n\nHowever, one thing that sometimes gets annoying, is that for people who either can't afford Premium or have something holding them back from getting it, they have a small amount of chances to choose a song they want to listen to right there and then. \n\nI understand that you need a way to get peop", "source": "app_store", "source_url": "https://apps.apple.com/us/app/spotify/id14198320744", "rating": 4, "created_at": "2026-06-18 18:16:20+00:00"}, {"text": "It takes 5 minutes to get a song to load with good wifi and even longer to load liked songs. I didn’t have this issue before it updated. What’s the point in paying for premium listening when I’m only able to load a handful of songs on a long commute? It’s so awkward at parties being like “yeah let’s get this party started!” and proceeding to listen to silence for 5 minutes", "source": "app_store", "source_url": "https://apps.apple.com/gb/app/spotify/id14185761014", "rating": 1, "created_at": "2026-06-15 14:10:50+00:00"}, {"text": "it only sucks if you dont have premium benefits but from my experience this is peak, although there was this song I forgot about that I'll put in later and edit that you guys deleted and im just asking to bring it back because it wasnt rude or anything, it was quite popular and it was my gf favourite song", "source": "play_store", "source_url": "https://play.google.com/store/apps/details?id=com.spotify.music&reviewId=gb_35faa455-0585-412c-9132-1a607d16379b", "rating": 5, "created_at": "2026-06-18 12:26:30+00:00"}]}, {"label": "Lack of Relevant Songs", "cells": {"2": {"volume": 68}, "4": {"volume": 68}, "5": {"volume": 68}}, "total": 204, "summary": "Users struggle to find related songs", "confidence": "medium", "quotes": [{"text": "when I lisen hanuman ji song single song after no one song available continue to hanuman bhajan amend it then we will give 5 star.", "source": "play_store", "source_url": "https://play.google.com/store/apps/details?id=com.spotify.music&reviewId=in_f882c5ec-bd13-4b76-8f05-8fee3bb17e65", "rating": 2, "created_at": "2026-06-18 15:22:45+00:00"}, {"text": "when I lisen hanuman ji song single song after no one song available continue to hanuman bhajan amend it then we will give 5 star.", "source": "play_store", "source_url": "https://play.google.com/store/apps/details?id=com.spotify.music&reviewId=us_f882c5ec-bd13-4b76-8f05-8fee3bb17e65", "rating": 2, "created_at": "2026-06-18 15:22:45+00:00"}, {"text": "when I lisen hanuman ji song single song after no one song available continue to hanuman bhajan amend it then we will give 5 star.", "source": "play_store", "source_url": "https://play.google.com/store/apps/details?id=com.spotify.music&reviewId=gb_f882c5ec-bd13-4b76-8f05-8fee3bb17e65", "rating": 2, "created_at": "2026-06-18 15:22:45+00:00"}]}, {"label": "Inadequate Search Results", "cells": {"1": {"volume": 51}, "3": {"volume": 51}, "4": {"volume": 51}}, "total": 153, "summary": "Users struggle with search and discovery", "confidence": "medium", "quotes": [{"text": "Search has always been bad - but as the offering increases, you’re often stuck with the first tranche of results with no concept of page two. Adding information to the search usually just adds bad results rather reordering good o       if (cell) {
        var alpha = 0.18 + 0.82 * (cell.volume / gmax);
        var hex   = Math.round(alpha * 255).toString(16).padStart(2,'0');
        var enc   = encodeURIComponent(JSON.stringify({
          label:row.label, volume:cell.volume, summary:row.summary,
          confidence:row.confidence, quotes:row.quotes,
          question:parseInt(q), cells:row.cells
        }));
        body += '<td class="cell" style="background:'+QC[q]+hex+'" ' +
          'onclick="showThemeEnc(\''+enc+'\')" title="'+cell.volume+' reviews">'+cell.volume+'</td>';
      } else {
        body += '<td class="empty"></td>';
      }
    });
    body += '<td style="padding-left:6px"><span class="vol-pill">'+row.total+'</span></td></tr>';
  });
  body += '</tbody>';
  table.innerHTML = head + body;
})();

// Source bars + donut
var srcNames  = {app_store:'App Store', play_store:'Play Store', reddit:'Reddit'};
var srcColors = {app_store:'#3b82f6', play_store:'#10b981', reddit:'#f97316'};
var maxSrc    = Math.max.apply(null, Object.values(D.source_counts).map(Number));
var srcBarsEl = document.getElementById('src-bars');
Object.keys(srcNames).forEach(function(s) {
  var n   = D.source_counts[s] || 0;
  var pct = maxSrc > 0 ? Math.round(n / maxSrc * 100) : 0;
  srcBarsEl.innerHTML +=
    '<div class="src-row">' +
      '<div class="src-label">'+srcNames[s]+'</div>' +
      '<div class="src-track"><div class="src-fill" style="width:'+pct+'%;background:'+srcColors[s]+'"></div></div>' +
      '<div class="src-n">'+n.toLocaleString()+'</div>' +
    '</div>';
});
new Chart(document.getElementById('srcChart'), {
  type:'doughnut',
  data:{
    labels:Object.keys(srcNames).map(function(k){return srcNames[k];}),
    datasets:[{data:Object.keys(srcNames).map(function(k){return D.source_counts[k]||0;}),
      backgroundColor:Object.keys(srcNames).map(function(k){return srcColors[k];}),borderWidth:0}]
  },
  options:{responsive:true,cutout:'62%',plugins:{legend:{labels:{color:'#666',font:{size:12}}}}}
});

// Volume bar chart
new Chart(document.getElementById('volChart'), {
  type:'bar',
  data:{
    labels:Object.keys(QL).map(function(q){return 'Q'+q+' '+QL[q];}),
    datasets:[{label:'Reviews',
      data:Object.keys(D.q_totals).map(function(q){return D.q_totals[q];}),
      backgroundColor:Object.keys(QL).map(function(q){return QC[q];}),borderRadius:5}]
  },
  options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},
    scales:{x:{grid:{color:'#1e1e1e'},ticks:{color:'#555'}},y:{grid:{display:false},ticks:{color:'#999'}}}}
});

// Top themes list
var topEl = document.getElementById('top-themes');
D.top_themes.forEach(function(t) {
  var color = QC[String(t.question)];
  var cls   = t.confidence === 'high' ? 'b-high' : t.confidence === 'medium' ? 'b-med' : 'b-low';
  var enc   = encodeURIComponent(JSON.stringify(t));
  topEl.innerHTML +=
    '<div class="t-row" onclick="showThemeEnc(\''+enc+'\')">' +
      '<div class="t-dot" style="background:'+color+'"></div>' +
      '<div class="t-info"><div class="t-lbl">'+t.label+'</div><div class="t-sum">'+t.summary+'</div></div>' +
      '<span class="badge '+cls+'">'+t.confidence+'</span>' +
      '<div class="t-vol">'+t.volume+'</div>' +
    '</div>';
});

// Panel helpers
function openPanel(html) {
  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('panel').style.display   = 'block';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('panel').scrollTop = 0;
}
function closePanel() {
  document.getElementById('panel').style.display   = 'none';
  document.getElementById('overlay').style.display = 'none';
}
function showThemeEnc(enc) { showTheme(JSON.parse(decodeURIComponent(enc))); }

function showTheme(t) {
  var cells = t.cells || {};
  var domQ  = String(t.question);
  var best  = -1;
  Object.keys(cells).forEach(function(q) { if (cells[q].volume > best) { best = cells[q].volume; domQ = q; } });
  var color = QC[domQ];

  var chips = '';
  Object.keys(cells).sort(function(a,b){return cells[b].volume - cells[a].volume;}).forEach(function(q) {
    chips += '<span class="q-chip" style="background:'+QC[q]+'22;color:'+QC[q]+'">'+QL[q]+' &middot; '+cells[q].volume+'</span>';
  });

  var html =
    '<div style="border-left:4px solid '+color+';padding-left:12px;margin-bottom:14px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:'+color+';margin-bottom:3px">Theme &middot; '+QL[domQ]+'</div>' +
      '<h3>'+t.label+'</h3>' +
      '<p class="dp-sum">'+t.summary+'</p>' +
    '</div>' +
    '<div class="dp-stats">' +
      '<div class="dp-stat"><div class="dp-stat-v" style="color:'+color+'">'+(t.volume||t.total||'&mdash;')+'</div><div class="dp-stat-l">Reviews</div></div>' +
      '<div class="dp-stat"><div class="dp-stat-v" style="color:'+color+';text-transform:capitalize">'+t.confidence+'</div><div class="dp-stat-l">Confidence</div></div>' +
    '</div>';
  if (chips) {
    html += '<div class="dp-lbl">Appears in</div><div style="margin-bottom:12px">'+chips+'</div>';
  }
  html += '<div class="dp-lbl">Representative Quotes</div>';
  var quotes = t.quotes || [];
  if (quotes.length === 0) {
    html += '<p style="font-size:12px;color:#444">No quotes stored.</p>';
  } else {
    quotes.forEach(function(q) {
      var src  = (q.source||'').replace(/_/g,' ');
      var star = q.rating ? ' &middot; '+q.rating+'★' : '';
      var txt  = (q.text||'').substring(0,350) + ((q.text||'').length > 350 ? '…' : '');
      html += '<div class="qt-card" style="border-color:'+color+'55">' +
        '<div class="qt-text">&ldquo;'+txt+'&rdquo;</div>' +
        '<div class="qt-src">'+src+star+'</div>' +
        '</div>';
    });
  }
  openPanel(html);
}

function showQ(qid) {
  var q     = D.diagnosis[qid]; if (!q) return;
  var color = QC[qid];
  var html  =
    '<div style="border-left:4px solid '+color+';padding-left:12px;margin-bottom:14px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:'+color+';margin-bottom:3px">Q'+qid+' &middot; '+QL[qid]+'</div>' +
      '<h3>'+q.question+'</h3>' +
    '</div>' +
    '<div class="dp-stats">' +
      '<div class="dp-stat"><div class="dp-stat-v" style="color:'+color+'">'+q.total_volume.toLocaleString()+'</div><div class="dp-stat-l">Reviews</div></div>' +
      '<div class="dp-stat"><div class="dp-stat-v" style="color:'+color+'">'+q.theme_count+'</div><div class="dp-stat-l">Themes</div></div>' +
    '</div>' +
    '<div class="dp-lbl">Themes</div>';
  q.themes.forEach(function(t) {
    html += '<div class="th-card" style="border-color:'+color+'">' +
      '<div class="th-hd"><span class="th-title">'+t.theme_label+'</span><span class="vol-pill">'+t.volume+'</span></div>' +
      '<p class="th-sum">'+t.summary+'</p>';
    (t.quotes||[]).slice(0,2).forEach(function(qt) {
      var txt = (qt.text||'').substring(0,180) + ((qt.text||'').length > 180 ? '…' : '');
      html += '<div class="qt-mini">&ldquo;'+txt+'&rdquo;</div>';
    });
    html += '</div>';
  });
  openPanel(html);
}
</script>
